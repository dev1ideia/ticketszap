<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ Configurações do Evento - TicketsZap</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; padding-top: 20px; padding-bottom: 20px; font-family: sans-serif; }
        .card-custom { border-radius: 20px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .lote-input-box { background-color: #f9fbfd; border: 1px solid #e3e8f1; border-radius: 12px; padding: 10px; margin-bottom: 12px; }
        .btn-success { background-color: #28a745; font-weight: bold; border-radius: 10px; padding: 12px; }
    </style>
</head>
<body>

<div class="container-fluid container-edit" style="max-width: 600px;">
    <div class="card card-custom p-4">
        
        <div class="d-flex align-items-center mb-4 text-secondary">
            <h3 class="m-0 text-dark">⚙️ Configurações do Evento</h3>
        </div>
        
        <form method="POST">
            
            <div class="mb-4">
                <h5 class="text-muted mb-3">Informações Básicas</h5>
                <div class="form-group">
                    <label class="text-secondary small">Nome do Evento</label>
                    <input type="text" name="nome" class="form-control" value="{{ evento.nome }}" required>
                </div>
                <div class="form-group">
                    <label class="text-secondary small">Data</label>
                    <input type="date" name="data_evento" class="form-control" value="{{ evento.data_evento }}">
                </div>
            </div>

            <hr class="my-4">

            <div class="mb-4">
                <h5 class="text-muted mb-3">Lotes e Preços ({{ lotes|length }} lotes ativos)</h5>
                
                {% for lote in lotes %}
                <div class="lote-input-box">
                    <input type="hidden" name="lote_id[]" value="{{ lote.id }}">
                    
                    <div class="row">
                        <div class="col-12 col-md-7 mb-2 mb-md-0">
                            <label class="small text-secondary">Nome do Lote</label>
                            <input type="text" name="lote_nome[]" class="form-control form-control-sm" value="{{ lote.nome }}">
                        </div>
                        
                        <div class="col-12 col-md-5">
                            <label class="small text-secondary">Preço (R$)</label>
                            <input type="number" step="0.01" name="lote_preco[]" class="form-control form-control-sm font-weight-bold" 
                                   value="{{ '%.2f'|format(lote.valor|float) }}" required>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success btn-block py-3 shadow">Gravar Alterações</button>
                <a href="{{ url_for('painel') }}" class="btn btn-light btn-block text-secondary mt-2">Voltar sem salvar</a>
            </div>
        </form>
    </div>
    
    <p class="text-center mt-3 text-muted" style="font-size: 0.85em;">
        Dica: Alterações de preço entram em vigor instantaneamente para todos os vendedores.
    </p>
</div>

</body>
</html>
